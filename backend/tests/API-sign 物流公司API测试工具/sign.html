<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>sign快速生成</title>
		 <link rel="stylesheet" href="./layui/css/layui.css">
		<link rel="stylesheet" href="./css/index.css" />
		 </style>
	</head>
	<body>

			<ul class="layui-nav">
				 <img src="http://open.4px.com/images/4PX_OPEN_blue.png">
			  <li class="layui-nav-item">
			    <a href="">首页</a>
			  </li>
			  <li class="layui-nav-item">
			    <a href="sign.html">sign快速生成</span></a>
			  </li>
			  <li class="layui-nav-item">
			    <a href="">查询</span></a>
			  </li>
			  <li class="layui-nav-item">
			    <a href="config.html">配置说明</span></a>
			  </li>
			  <li class="layui-nav-item">
			    <a href="">帮助</span></a>
			  </li>
			</ul>
		<div id="form">
			<form class="layui-form" action="" lay-filter="test1">
				<div class="layui-form-item">
					<label class="layui-form-label">AppKey</label>
						<div class="layui-input-inline min-450">
							<input type="text" id="AppKey" value="" name="AppKey" required  lay-verify="required" placeholder="AppKey" autocomplete="off" class="layui-input">
					</div>
				  <label class="layui-form-label">AppSecret</label>
				  <div class="layui-input-inline min-450">
				    <input type="text" value="" id="AppSecret" name="AppSecret" required  lay-verify="required" placeholder="AppSecret" autocomplete="off" class="layui-input">
				  </div>
				</div>
				  <div class="layui-form-item">
				    <label class="layui-form-label">接口</label>
				    <div class="layui-input-inline min-450">
				     <select id='method' name="method" lay-filter="method" lay-verify="" lay-search>
			
				     </select>
				    </div>
					<label class="layui-form-label">版本</label>
					<div class="layui-input-inline min-450"  lay-filter="v">
					 <select id="v" name="v" lay-verify="" lay-search>

					 </select>  
					</div>
				  </div>
				  <div class="layui-form-item">
				    <label class="layui-form-label">所属业务</label>
				    <div class="layui-input-inline" style="width: 550px;">
				      <input type="radio" name="type" lay-filter="type" value="全球直发" title="全球直发-XMS" checked>
				      <input type="radio" name="type" lay-filter="type" value="订单履约" title="订单履约-FB4">
					  <input type="radio" name="type" lay-filter="type" value="公共服务" title="公共服务">
				    </div>
			    <div class="layui-form-item">
			      <label class="layui-form-label">请求环境</label>
			      <div class="layui-input-inline" style="width: 550px;">
			        <input id='http_test' type="radio" name="url" lay-filter="url" value="https://open-test.4px.com/router/api/service" title="测试环境" checked>
			        <input id='http_sc' type="radio" name="url" lay-filter="url" value="https://open.4px.com/router/api/service" title="生产环境">
					<input type="checkbox"  lay-filter="usertime" name="usertime" title="时间戳" lay-skin="primary">
					<input type="number" id="timestamp" name="timestamp" style="width: 140px;display: inline-block;" required  placeholder="请输入时间戳" autocomplete="off" class="layui-input layui-hide">
			      </div>
				</div>
				  <div class="layui-form-item layui-form-text">
				    <label class="layui-form-label">请求body</label>
					<button id="y_json" type="button" 	class="layui-btn layui-btn-xs">json压缩</button>
					<button id="j_json" type="button" 	class="layui-btn layui-btn-xs">json格式化</button>
					<a id="api_link" target="_blank" href="#"  class="layui-font-blue"></a>
				    <div class="layui-input-block">
				      <textarea name="body" id="aaa" lay-verify="required"  placeholder="JSON格式-请求BODY不要有多余的空格-并且是压缩的json" style="min-height: 280px; " class="layui-textarea"></textarea>
				    </div>
				  </div>
			  
			  <div class="layui-form-item">
				<div class="layui-input-block">
				  <button class="layui-btn" lay-submit lay-filter="formDemo">立即生成</button>
				  <button type="reset" class="layui-btn layui-btn-primary">重置</button>
				</div>
			  </div>
			</form>
			<div class="layui-form-item" style="margin-left: 110px;margin-top: 20px;">
			<span class="layui-badge layui-bg-blue">请求URL:</span>
			<span id="url"></span><button type="button" id="copy_u"  	class="layui-btn layui-btn-xs">复制</button>
			 </div>
			 <div class="layui-form-item" style="margin-left: 110px;margin-top: 20px;">
			<span class="layui-badge layui-bg-green">MD5加密:</span>
			<span id="md5"></span><button id="copy_m" type="button"  	class="layui-btn layui-btn-xs">复制</button>
			<button id="copy_sign" type="button"  	class="layui-btn layui-btn-xs" style="background-color: #306f9e;">点击查看sign组成</button>
			 </div>
			<div class="layui-form-item" style="margin-left: 110px;margin-top: 20px;">
			<span class="layui-badge">请求body:</span>
			<span id="body"></span><button id="copy_b" type="button" 	class="layui-btn layui-btn-xs">复制</button>
			 </div>
		</div>
		<script src="./layui/layui.js"></script>
		<script src="./jquery-3.5.1/jquery-3.5.1.min.js"></script>
		<script src="./js/MD5.js"></script>
		<script src='./js/Clipboard.js'></script>
		<script src='./config/api_data.js'></script>
		<script src="./js/sign.js"></script>
	</body>
</html>
